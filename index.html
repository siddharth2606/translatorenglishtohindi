<!DOCTYPE html>
<html>

<head>
<title>Translator</title>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:100px;
background:#f4f4f4;
}

input{
padding:10px;
width:300px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
margin-left:10px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

</style>

</head>

<body>

<h1>English → Hindi Translator</h1>

<input id="text" placeholder="Enter text">

<button onclick="translateText()">Translate</button>

<p id="result"></p>

<script>

async function translateText(){

let text = document.getElementById("text").value;

let response = await fetch("http://127.0.0.1:8000/translate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({text:text})
});

let data = await response.json();

document.getElementById("result").innerText = data.translation;

}

</script>

</body>

</html>
